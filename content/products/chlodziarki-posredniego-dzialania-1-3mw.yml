sections:
  - title: "Zastosowanie"
    body: "Chłodziarki pośredniego działania o mocy chłodniczej 1000-3000 kW są przeznaczone do chłodzenia wody, która doprowadzana jest do chodnikowych i/lub ścianowych chłodnic powietrza w podziemnych wyrobiskach górniczych."
