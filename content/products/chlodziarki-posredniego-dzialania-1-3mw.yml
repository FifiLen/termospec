    body: "Woda ciepła z obiegu chłodzenia skraplacza stacjonarnych chłodziarek pośredniego działania jest chłodzona w zainstalowanych w zużytym prądzie powietrza chłodnicach wyparnych wody. Stosowany może być również system bezpośredniego chłodzenia skraplacza wodą technologiczną, tzw. system otwarty chłodzenia."
