sections:
  - title: "Charakterystyka"
    body: "Chłodnice powietrza CP(N) o mocy chłodniczej 60 do 450 kW są przewidziane do stosowania w podziemnych wyrobiskach górniczych w pomieszczeniach zaliczonych do stopnia \"a\", \"b\" lub \"c\" zagrożenia wybuchem metanu i pomieszczenia klasy A i B zagrożenia wybuchem pyłu węglowego."
  - title: "Współpraca z układem"
    body: "Chłodnice powietrza CP są przeznaczone do współpracy z systemem klimatyzacji centralnej lub grupowej. Schładzanie powietrza odbywa się w wyniku wymiany ciepła pomiędzy zimną wodą i powietrzem. Urządzenie może być zasilane z agregatów chłodniczych pośredniego działania z parownikami chłodzącymi wodę."
  - title: "Warianty wykonania"
    body: "Chłodnice powietrza produkowane są w wersji normalnej oraz niskooporowej. Wersja normalna oferowana jest w wykonaniu kwadratowym lub okrągłym."
