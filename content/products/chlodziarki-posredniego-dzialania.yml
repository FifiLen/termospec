sections:
  - title: "Zastosowanie"
    body: "Chłodziarki pośredniego działania o mocy chłodniczej 300-900 kW są przeznaczone do chłodzenia wody, która doprowadzana jest do chodnikowych i/lub ścianowych chłodnic powietrza w podziemnych wyrobiskach górniczych."
  - title: "Chłodzenie skraplacza"
    body: "Woda ciepła z obiegu chłodzenia skraplacza lokalnych chłodziarek pośredniego działania jest chłodzona w zainstalowanych w zużytym prądzie powietrza chłodnicach wyparnych wody. Stosowany może być również system bezpośredniego chłodzenia skraplacza wodą technologiczną, tzw. system otwarty chłodzenia."
  - title: "Dodatkowe zastosowania"
    body: "Chłodziarki pośredniego działania mogą być również wykorzystane w opatentowanym systemie układu chłodzenia silników elektrycznych, przekładni i przemienników częstotliwości pracujących w podziemnych zakładach górniczych."
