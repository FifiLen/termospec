sections:
  - title: "Zastosowanie"
    body: "W podziemnych kopalniach węgla kamiennego stosuje się lokalne chłodziarki bezpośredniego działania do klimatyzacji robót przodkowych drążonych chodników, przekopów i ścian eksploatacyjnych."
  - title: "Zasada działania"
    body: "W chłodziarce bezpośredniego działania parownik jest wykorzystywany do bezpośredniego chłodzenia powietrza jako chłodnica powietrza. Przepływające przez parownik powietrze o temperaturze powyżej 26 °C chłodzone jest o 10-14 °C."
  - title: "Obieg chłodzenia"
    body: "Woda ciepła z obiegu chłodzenia skraplacza lokalnych chłodziarek bezpośredniego działania jest chłodzona w zainstalowanych w zużytym prądzie powietrza chłodnicach wyparnych wody. Stosowany może być również system bezpośredniego chłodzenia skraplacza wodą technologiczną, tzw. system otwarty chłodzenia."
